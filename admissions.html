<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admissions - Pentecost Preparatory School</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="news.html">News</a>
    <a href="admissions.html">Admissions</a>
    <a href="contact.html">Contact</a>
  </nav>

  <!-- HEADER -->
  <header id="header" style="background-image: url('images/default-header-bg.jpg');">
    <img id="logo" src="images/default-logo.png" alt="School Logo">
    <h1 id="header-title">Admissions</h1>
    <p id="header-subtitle">Apply to join Pentecost Preparatory School</p>
  </header>

  <!-- ADMISSIONS SECTION -->
  <section id="admissions">
    <h2 id="admissions-title">Admissions Form</h2>
    <p id="admissions-text">Fill out the form below to apply.</p>
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="text" name="student_name" placeholder="Student Name" required>
      <input type="text" name="parent_name" placeholder="Parent Name" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>
      <input type="text" name="class" placeholder="Class Applying For" required>
      <button type="submit">Apply Now</button>
    </form>
  </section>

</body>
</html>

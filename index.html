<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pentecost Preparatory School</title>
<style>
  body { 
    font-family: Arial, sans-serif; 
    margin: 0; 
    scroll-behavior: smooth; 
    background: #f9f9f9; /* light background for readability */
    color: #222; /* default text color */
  }

  /* HEADER */
  header { 
    padding: 40px 20px; 
    text-align: center; 
    background-size: cover; 
  }
  header h1,
  header p {
    color: black;  /* header title + subtitle black */
  }

  /* NAV */
  nav { 
    background: #0066cc; 
    display: flex; 
    justify-content: center; 
    position: sticky; 
    top: 0; 
    z-index: 100;
  }
  nav a { 
    color: white; 
    padding: 15px 25px; 
    text-decoration: none; 
    font-weight: bold; 
  }
  nav a:hover { 
    background: #004080; 
  }

  /* SECTIONS */
  section { 
    padding: 60px 20px; 
    max-width: 900px; 
    margin: auto; 
    background-size: cover; 
    background-position: center;
    color: #222; /* dark text for readability on any background */
  }
  section h2 { 
    color: #004080; 
    margin-top: 0; 
  }

  /* FORMS */
  form input, form button { 
    width: 100%; 
    padding: 10px; 
    margin: 8px 0; 
    box-sizing: border-box; 
    color: #222;
  }
  form button { 
    background: #004080; 
    color: white; 
    border: none; 
    cursor: pointer; 
    font-size: 16px; 
  }
  form button:hover { 
    background: #0066cc; 
  }

  /* FOOTER */
  footer { 
    text-align: center; 
    padding: 20px; 
    background: #004080; 
    color: white; 
  }
</style>
</head>
<body>
<!-- HEADER -->
<header id="header" style="background-image: url('images/default-home-bg.jpg');">
  <img id="logo" src="" alt="School Logo" style="height:80px;">
  <h1 id="header-title"></h1>
  <p id="header-subtitle"></p>
</header>

<!-- NAV -->
<nav>
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#news">News</a>
  <a href="#admissions">Admissions</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HOME -->
<section id="home" style="background-image: url('images/default-home-bg.jpg');">
  <h2 id="home-title"></h2>
  <p id="home-body"></p>
</section>

<!-- ABOUT -->
<section id="about">
  <h2 id="about-title"></h2>
  <p id="about-body"></p>
</section>

<!-- NEWS -->
<section id="news">
  <h2 id="news-title"></h2>
  <div id="news-items"></div>
</section>

<!-- ADMISSIONS -->
<section id="admissions">
  <h2 id="admissions-title"></h2>
  <p id="admissions-instructions"></p>
  <form action="https://formspree.io/f/xaqlkjrn" method="POST">
    <input type="text" name="student_name" placeholder="Student Name" required>
    <input type="text" name="parent_name" placeholder="Parent Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="text" name="class" placeholder="Class Applying For" required>
    <button type="submit">Apply Now</button>
  </form>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2 id="contact-title"></h2>
  <p id="contact-phone"></p>
  <p id="contact-address"></p>
</section>

<!-- JS to load content dynamically from CMS -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
function parseFrontMatter(md) {
  const match = md.match(/---\n([\s\S]*?)\n---/);
  if (!match) return {};
  
  const lines = match[1].split('\n');
  const data = {};

  lines.forEach(line => {
    const [key, ...rest] = line.split(':');
    if (!key) return;
    data[key.trim()] = rest.join(':').trim();
  });

  return data;
}

async function loadContent(file) {
  const res = await fetch('/content/' + file);
  const md = await res.text();
  return parseFrontMatter(md);
}

/* ================= HEADER ================= */
loadContent('header.md').then(data => {
  document.getElementById('header-title').textContent = data.title || "";
  document.getElementById('header-subtitle').textContent = data.subtitle || "";

  if (data.logo) {
    document.getElementById('logo').src = data.logo;
  }

  if (data.background) {
    document.getElementById('header').style.backgroundImage = `url('${data.background}')`;
  }
});

/* ================= HOME ================= */
loadContent('home.md').then(data => {
  document.getElementById('home-title').textContent = data.title || "";
  document.getElementById('home-body').textContent = data.text || "";

  if (data.background) {
    document.getElementById('home').style.backgroundImage = `url('${data.background}')`;
  }
});

/* ================= ABOUT ================= */
loadContent('about.md').then(data => {
  document.getElementById('about-title').textContent = data.title || "";
  document.getElementById('about-body').textContent = data.text || "";
});

/* ================= NEWS ================= */
fetch('/content/news.md')
  .then(res => res.text())
  .then(md => {
    const container = document.getElementById('news-items');
    container.innerHTML = "";

    const items = md.split('- title:').slice(1);

    items.forEach(item => {
      const titleMatch = item.match(/^(.*)/);
      const descMatch = item.match(/description:\s*(.*)/);
      const imgMatch = item.match(/image:\s*(.*)/);

      const title = titleMatch ? titleMatch[1].trim() : "";
      const desc = descMatch ? descMatch[1].trim() : "";
      const img = imgMatch ? imgMatch[1].trim() : "";

      const div = document.createElement('div');

      div.innerHTML = `
        <h3>${title}</h3>
        <p>${desc}</p>
        ${img ? `<img src="${img}" style="max-width:100%; margin-bottom:20px;">` : ""}
      `;

      container.appendChild(div);
    });
  });

/* ================= ADMISSIONS ================= */
loadContent('admissions.md').then(data => {
  document.getElementById('admissions-title').textContent = data.title || "";
  document.getElementById('admissions-instructions').textContent = data.text || "";
});

/* ================= CONTACT ================= */
loadContent('contact.md').then(data => {
  document.getElementById('contact-title').textContent = data.title || "";
  document.getElementById('contact-phone').textContent = data.phone || "";
  document.getElementById('contact-address').textContent = data.address || "";
});
</script>

<!-- Netlify Identity -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</body>
</html>

backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:

      # Header section
      - file: "content/header.md"
        label: "Header Section"
        name: "header"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Logo", name: "logo", widget: "image", required: false}
          - {label: "Background Image", name: "background", widget: "image", required: false}

      # About section
      - file: "content/about.md"
        label: "About Section"
        name: "about"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Content", name: "body", widget: "markdown"}
          - {label: "Background Image", name: "background", widget: "image", required: false}

      # News section
      - file: "content/news.md"
        label: "News Section"
        name: "news"
        fields:
          - label: "News Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Image", name: "image", widget: "image", required: false}

      # Contact section
      - file: "content/contact.md"
        label: "Contact Section"
        name: "contact"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}

      # Admissions section
      - file: "content/admissions.md"
        label: "Admissions Section"
        name: "admissions"
        fields:
          - {label: "Form Header", name: "form_header", widget: "string"}
          - {label: "Instructions", name: "instructions", widget: "text"}

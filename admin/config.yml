backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

publish_mode: simple

collections:
  - name: "pages"
    label: "Pages"
    files:

      - file: "content/header.md"
        label: "Header"
        name: "header"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Logo", name: "logo", widget: "image", required: false}
          - {label: "Background", name: "background", widget: "image", required: false}

      - file: "content/home.md"
        label: "Home"
        name: "home"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Text", name: "text", widget: "text"}
          - {label: "Background", name: "background", widget: "image", required: false}

      - file: "content/about.md"
        label: "About"
        name: "about"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}

      - file: "content/news.md"
        label: "News"
        name: "news"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Image", name: "image", widget: "image", required: false}

      - file: "content/contact.md"
        label: "Contact"
        name: "contact"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}

      - file: "content/admissions.md"
        label: "Admissions"
        name: "admissions"
        fields:
          - {label: "Form Header", name: "form_header", widget: "string"}
          - {label: "Instructions", name: "instructions", widget: "text"}
